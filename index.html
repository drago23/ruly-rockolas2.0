<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * blob: data: 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; media-src * blob:;">
    <meta name="referrer" content="no-referrer">
    <title>Ruly Rockolas</title>
    <style>
        /* === ESTILOS BASE FUNCIONALES === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        #reproductor {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* AQUÍ PUEDES AGREGAR DESPUÉS TODOS TUS ESTILOS PROPIOS SIN MODIFICAR LO DE ARRIBA */
    </style>
</head>
<body>

    <!-- Contenedor del reproductor oficial -->
    <div id="reproductor"></div>

    <!-- AQUÍ PUEDES AGREGAR DESPUÉS TODA TU ESTRUCTURA HTML (botones, menús, etc.) -->

    <!-- Carga API OFICIAL de YouTube (forma permitida sin anuncios) -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let reproductor;

        // Inicialización automática de la API
        function onYouTubeIframeAPIReady() {
            reproductor = new YT.Player('reproductor', {
                width: '100%',
                height: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3,
                    'fs': 1,
                    'playsinline': 1,
                    'enablejsapi': 1,
                    'origin': 'https://drago23.github.io',
                    'adformat': 'none',
                    'showinfo': 0
                },
                events: {
                    'onReady': reproductorListo,
                    'onStateChange': cambioEstado
                }
            });
        }

        function reproductorListo(e) {
            console.log("Sistema listo para reproducir");
        }

        function cambioEstado(e) {
            // Lógica cuando termina un video
            if (e.data === YT.PlayerState.ENDED) {
                // Aquí va tu función de siguiente canción cuando la agregues
                console.log("Video terminado");
            }
        }

        // FUNCIÓN LISTA PARA USAR: SOLO LLAMA A ESTA CON EL ID DEL VIDEO
        function reproducirVideo(idVideo) {
            if (reproductor && typeof reproductor.loadVideoById === 'function') {
                reproductor.loadVideoById(idVideo);
            } else {
                console.log("Reproductor aún no listo");
            }
        }

        // === AQUÍ PUEDES AGREGAR DESPUÉS TODO TU CÓDIGO JS PROPIO ===
        // Ejemplo de uso directo: reproducirVideo("dQw4w9WgXcQ");
    </script>

</body>
</html>
