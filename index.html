    <style>
        /* --- AQUÍ PEGA TODOS TUS ESTILOS CSS ORIGINALES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: Arial, sans-serif; color: #fff; }

    </style>

<body>

    <!-- Reproductor oficial sin anuncios -->
    <div id="reproductor"></div>

    <!-- --- AQUÍ PEGA TODA TU ESTRUCTURA HTML ORIGINAL --- -->
    <!-- Botones, búsqueda, lista, cola, créditos, menús, todo lo que se ve en pantalla -->

    <!-- Carga API oficial de YouTube -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let reproductor;

        function onYouTubeIframeAPIReady() {
            reproductor = new YT.Player('reproductor', {
                width: '100%',
                height: '100%',
                playerVars: {
                    autoplay: 1,
                    controls: 1,
                    rel: 0,
                    modestbranding: 1,
                    iv_load_policy: 3,
                    fs: 1,
                    playsinline: 1,
                    enablejsapi: 1,
                    origin: "https://drago23.github.io",
                    adformat: "none",
                    showinfo: 0
                },
                events: {
                    onReady: listoReproductor,
                    onStateChange: cambioEstado
                }
            });
        }

        function listoReproductor() { console.log("Sistema listo"); }

        function cambioEstado(e) {
            if (e.data === YT.PlayerState.ENDED) {
                // Aquí va tu función para pasar a la siguiente canción
            }
        }

        // ✅ Función lista para usar: solo llama con el ID del video
        function reproducirVideo(idVideo) {
            if (reproductor && reproductor.loadVideoById) {
                reproductor.loadVideoById(idVideo);
            }
        }

        /* --- AQUÍ PEGA TODO TU CÓDIGO JAVASCRIPT ORIGINAL ---
        ⚠️ Cambia cualquier línea que diga:
           reproductor.src = "https://www.youtube.com/embed/ID";
        por:
           reproducirVideo("ID");
        */
    </script>

</body>
